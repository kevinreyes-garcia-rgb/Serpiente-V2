<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake - La Serpiente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            color: white;
            touch-action: none;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .score-board {
            text-align: center;
            margin-bottom: 15px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        canvas {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            display: block;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 70px);
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            color: white;
            font-size: 24px;
            width: 70px;
            height: 70px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
        }

        .btn-up { grid-column: 2; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
        }

        .game-over.show {
            display: block;
        }

        .restart-btn {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .restart-btn:active {
            background: #45a049;
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score-board">
            Puntos: <span id="score">0</span> | Récord: <span id="highScore">0</span>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls">
            <button class="btn btn-up" id="btnUp">▲</button>
            <button class="btn btn-left" id="btnLeft">◄</button>
            <button class="btn btn-down" id="btnDown">▼</button>
            <button class="btn btn-right" id="btnRight">►</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>¡Juego Terminado!</h2>
        <p style="font-size: 20px; margin: 15px 0;">Puntos: <span id="finalScore">0</span></p>
        <button class="restart-btn" id="restartBtn">Jugar de Nuevo</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        // Configurar tamaño del canvas
        const gridSize = 20;
        const tileCount = 15;
        canvas.width = gridSize * tileCount;
        canvas.height = gridSize * tileCount;

        let snake = [{x: 7, y: 7}];
        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let gameSpeed = 150;
        let touchStartX = 0;
        let touchStartY = 0;

        highScoreEl.textContent = highScore;

        function drawGame() {
            // Limpiar canvas
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar comida
            ctx.fillStyle = '#FF6B6B';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#FF6B6B';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
            ctx.shadowBlur = 0;

            // Dibujar serpiente
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#4ECDC4' : '#45B7AF';
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });

            // Mover serpiente
            if (dx !== 0 || dy !== 0) {
                const head = {x: snake[0].x + dx, y: snake[0].y + dy};

                // Verificar colisión con paredes
                if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                    endGame();
                    return;
                }

                // Verificar colisión con cuerpo
                if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                    endGame();
                    return;
                }

                snake.unshift(head);

                // Verificar si comió
                if (head.x === food.x && head.y === food.y) {
                    score++;
                    scoreEl.textContent = score;
                    if (score > highScore) {
                        highScore = score;
                        highScoreEl.textContent = highScore;
                        localStorage.setItem('snakeHighScore', highScore);
                    }
                    generateFood();
                } else {
                    snake.pop();
                }
            }
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Asegurar que la comida no aparezca sobre la serpiente
            if (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
                generateFood();
            }
        }

        function changeDirection(newDx, newDy) {
            // Evitar que la serpiente se mueva en dirección opuesta
            if ((dx === -newDx && newDx !== 0) || (dy === -newDy && newDy !== 0)) {
                return;
            }
            dx = newDx;
            dy = newDy;
        }

        function endGame() {
            clearInterval(gameLoop);
            finalScoreEl.textContent = score;
            gameOverEl.classList.add('show');
        }

        function restartGame() {
            snake = [{x: 7, y: 7}];
            dx = 0;
            dy = 0;
            score = 0;
            scoreEl.textContent = score;
            generateFood();
            gameOverEl.classList.remove('show');
            gameLoop = setInterval(drawGame, gameSpeed);
        }

        // Controles táctiles en botones
        document.getElementById('btnUp').addEventListener('click', () => changeDirection(0, -1));
        document.getElementById('btnDown').addEventListener('click', () => changeDirection(0, 1));
        document.getElementById('btnLeft').addEventListener('click', () => changeDirection(-1, 0));
        document.getElementById('btnRight').addEventListener('click', () => changeDirection(1, 0));

        // Controles táctiles por deslizamiento
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Movimiento horizontal
                if (diffX > 0) changeDirection(1, 0); // Derecha
                else changeDirection(-1, 0); // Izquierda
            } else {
                // Movimiento vertical
                if (diffY > 0) changeDirection(0, 1); // Abajo
                else changeDirection(0, -1); // Arriba
            }
        });

        // Controles de teclado para testing en PC
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': changeDirection(0, -1); break;
                case 'ArrowDown': changeDirection(0, 1); break;
                case 'ArrowLeft': changeDirection(-1, 0); break;
                case 'ArrowRight': changeDirection(1, 0); break;
            }
        });

        document.getElementById('restartBtn').addEventListener('click', restartGame);

        // Iniciar juego
        generateFood();
        gameLoop = setInterval(drawGame, gameSpeed);
    </script>
</body>
</html>
